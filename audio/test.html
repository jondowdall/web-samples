<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width" />
    <title>Audio Analyser</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        html {
            box-sizing: border-box;
            font-family: sans-serif;
            font-size: 10pt;
        }

        *,
        *:before,
        *:after {
            box-sizing: inherit;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100dvw;
            height: 100dvh;
        }

        #main {
            width: 100vw;
            height: 95vh;
        }

        #overlay {
            position: fixed;
            bottom: 1em;
            right: 1em;
            border-radius: 0.5em;
            padding: 0.5em;
            background: white;
            box-shadow: 5px 5px 5px rgb(200, 200, 200, 0.9);
        }

        #start {
            font-size: 400%;
            font-weight: bold;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }


        #controls {
            position: fixed;
            top: 1em;
            left: 1em;
        }

        #waterfall {
            display: none;
        }

    </style>
</head>

<body>
    <canvas id="main"></canvas>
    <canvas id="waterfall"></canvas>

    </div>
    <div id="overlay"></div>
    <button id="start">Start</button>
    <div id="controls">
    <button id="pause">Pause</button>
    <button id="reset">Reset</button>
    </div>
    <script src="test.js"></script>
</body>

</html>
